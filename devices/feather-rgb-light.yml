device:
  id: feather-rgb-light
  name: Feather RGB Light
  board: adafruit_feather_rp2040

mqtt:
  broker_host: homeassistant.local
  broker_port: 8883
  client_id: feather-rgb-light
  keepalive_s: 60
  socket_timeout_s: 15
  topic_root: vanlab/feather-rgb-light

standalone_modules:
  - type: neopixel_light
    id: rgb_light
    name: RGB Light
    gpio:
      pins: [16]
      roles: [indicator]
